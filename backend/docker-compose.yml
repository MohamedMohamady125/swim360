version: '3.8'

services:
  # FastAPI Backend
  api:
    build: .
    container_name: swim360_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - swim360_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database (optional - for local development)
  # Use Supabase in production
  db:
    image: postgres:15-alpine
    container_name: swim360_db
    environment:
      - POSTGRES_USER=swim360
      - POSTGRES_PASSWORD=swim360_password
      - POSTGRES_DB=swim360_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - swim360_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swim360"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (optional - for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: swim360_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - swim360_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx (optional - reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: swim360_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - swim360_network

volumes:
  postgres_data:
  redis_data:

networks:
  swim360_network:
    driver: bridge
